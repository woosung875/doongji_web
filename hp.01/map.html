           onmouseenter="this.style.borderColor='var(--accent-color)'; this.style.color='var(--primary-color)'; this.style.boxShadow='0 2px 8px rgba(197, 160, 89, 0.25)';"

    <!-- Main Full Screen Map -->
    <section style="margin-top: 122px; height: calc(100vh - 122px); width: 100%; position: relative;">

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3e8097eb16c9e4942d0cbb215d2da6e6&libraries=services,clusterer" onerror="window.kakaoMapFailed = true;"></script>
    <script>
        // Mobile Menu Toggle
        const menuToggle = document.getElementById('mobile-menu');
        const navList = document.querySelector('.nav-list');

        menuToggle.addEventListener('click', () => {
            navList.classList.toggle('active');
        });

        // Dynamic Loading from localStorage & Kakao Map integration
        function getProperties() {
            let props = localStorage.getItem('nest_properties');
            // Fallback default properties (Gangnam Datasets)
            const defaultProperties = [
                {
                    id: "prop-1",
                    tag: "서울",
                    type: "사무실",
                    floor: "5층",
                    title: "역삼역 초역세권 대형 프라임 오피스",
                    desc: "전용 150평 / 테헤란로 뷰 / 고층 오피스 빌딩 내 지상 5층",
                    price: "보증금 5억 / 월 4,500만",
                    imageUrl: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=800",
                    lat: 37.5019,
                    lng: 127.0374
                },
                {
                    id: "prop-2",
                    tag: "서울",
                    type: "상가",
                    floor: "1층",
                    title: "청담동 명품거리 1층 로드샵 상가",
                    desc: "전용 80평 / 쇼룸 완비 / 1층 테라스 활용 가능",
                    price: "가격 협의",
                    imageUrl: "https://images.unsplash.com/photo-1554469384-e58fac16e23a?auto=format&fit=crop&q=80&w=800",
                    lat: 37.5251,
                    lng: 127.0435
                },
                {
                    id: "prop-3",
                    tag: "경기",
                    type: "토지",
                    floor: "1층",
                    title: "용인 기흥 상업용 개발 토지 매매",
                    desc: "토지면적 450평 / 대로변 코너 / 근생 및 물류 부지 추천",
                    price: "매매 45억",
                    imageUrl: "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&q=80&w=800",
                    lat: 37.2804,
                    lng: 127.1179
                },
                {
                    id: "prop-4",
                    tag: "서울",
                    type: "상가",
                    floor: "-1층",
                    title: "강남역 인근 지하 대형 F&B 상가",
                    desc: "전용 120평 / 지하 1층 단독 진입 계단 / 주방 설비 완비 및 층고 4m",
                    price: "보증금 2억 / 월 1,500만",
                    imageUrl: "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&q=80&w=800",
                    lat: 37.4979,
                    lng: 127.0276
                },
                {
                    id: "prop-5",
                    tag: "경기",
                    type: "주거용",
                    floor: "12층",
                    title: "분당 정자동 오피스텔 주거용 풀옵션",
                    desc: "전용 24평 / 지상 12층 탄천 뷰 / 침실 2개 / 즉시 입주 가능",
                    price: "보증금 3,000만 / 월 180만",
                    imageUrl: "https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=800",
                    lat: 37.3614,
                    lng: 127.1086
                },
                {
                    id: "prop-6",
                    tag: "서울",
                    type: "빌딩",
                    floor: "7층",
                    title: "테헤란로 삼성동 대로변 프라임 사옥 빌딩",
                    desc: "연면적 450평 / 지상 7층 전체 통임대 / 자주식 주차 10대",
                    price: "보증금 8억 / 월 6,000만",
                    imageUrl: "https://images.unsplash.com/photo-1577495508048-b635879837f1?auto=format&fit=crop&q=80&w=800",
                    lat: 37.5097,
                    lng: 127.0620
                }
            ];

            if (!props || JSON.parse(props).length === 0 || JSON.parse(props)[0].tag === "부산진구" || (JSON.parse(props)[0].tag !== "서울" && JSON.parse(props)[0].tag !== "경기")) {
                localStorage.setItem('nest_properties', JSON.stringify(defaultProperties));
                return defaultProperties;
            }
            return JSON.parse(props);
        }

        let map;
        let leafletMap;
        let kakaoClusterer; // Kakao Map Clusterer
        let leafletClusterGroup; // Leaflet Cluster Group
        let markers = {}; 

        // Dynamic Leaflet Loader (chains Leaflet + MarkerCluster)
        function loadLeaflet(callback) {
            // Leaflet CSS
            const css = document.createElement('link');
            css.rel = 'stylesheet';
            css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
            document.head.appendChild(css);

            // MarkerCluster CSS
            const clusterCss = document.createElement('link');
            clusterCss.rel = 'stylesheet';
            clusterCss.href = 'https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css';
            document.head.appendChild(clusterCss);

            const clusterDefaultCss = document.createElement('link');
            clusterDefaultCss.rel = 'stylesheet';
            clusterDefaultCss.href = 'https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css';
            document.head.appendChild(clusterDefaultCss);

            // Leaflet JS
            const js = document.createElement('script');
            js.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
            js.onload = () => {
                const clusterJs = document.createElement('script');
                clusterJs.src = 'https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js';
                clusterJs.onload = callback;
                document.head.appendChild(clusterJs);
            };
            document.head.appendChild(js);
        }

        function initMap() {
            // Check if Kakao Maps API is loaded, else fallback to Leaflet Map
            if (typeof kakao === 'undefined' || !kakao.maps || window.kakaoMapFailed) {
                console.warn("Kakao Maps API failed to load or was blocked. Initiating Leaflet fallback map...");
                
                // Show brief fallback message inside #map before loading Leaflet
                document.getElementById('map').innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #666; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #f9f9f9; font-family: sans-serif;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #C5A059; margin-bottom: 15px;"></i>
                        <h4 style="margin: 0 0 10px 0; color: #0c1222;">안전 대체 지도 연결 중</h4>
                        <p style="font-size: 0.85rem; max-width: 300px; line-height: 1.5; margin: 0 0 15px 0;">
                            카카오 지도 도메인 승인 대기 상태입니다. 임시로 무인증 안전 지도를 즉시 가동합니다.
                        </p>
                    </div>
                `;

                loadLeaflet(() => {
                    document.getElementById('map').innerHTML = ''; // Clear loading message
                    
                    // Center around Gangnam/Yeoksam (37.5080, 127.0360)
                    leafletMap = L.map('map').setView([37.5080, 127.0360], 13);
                    
                    // Load standard OpenStreetMap tiles
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(leafletMap);

                    // Add a tiny gold indicator badge on top of map container
                    const badge = document.createElement('div');
                    badge.style.position = 'absolute';
                    badge.style.top = '15px';
                    badge.style.left = '60px';
                    badge.style.zIndex = '1000';
                    badge.style.background = 'rgba(12, 18, 34, 0.95)';
                    badge.style.color = '#C5A059';
                    badge.style.padding = '6px 12px';
                    badge.style.borderRadius = '4px';
                    badge.style.fontSize = '11px';
                    badge.style.fontWeight = '600';
                    badge.style.boxShadow = '0 2px 8px rgba(0,0,0,0.15)';
                    badge.style.pointerEvents = 'none';
                    badge.style.fontFamily = 'sans-serif';
                    badge.innerHTML = '<i class="fas fa-info-circle" style="margin-right: 5px;"></i>대체 지도 작동 중 (카카오 인증 대기)';
                    document.getElementById('map').appendChild(badge);

                    // Invalidate size after brief timeout to avoid leaflet rendering breaks
                    setTimeout(() => {
                        leafletMap.invalidateSize();
                    }, 100);

                    // Parse params & render
                    parseUrlParameters();
                });
                return;
            }

            map = new kakao.maps.Map(document.getElementById('map'), {
                center: new kakao.maps.LatLng(37.5080, 127.0360), // Centered around Gangnam/Yeoksam, Seoul
                level: 5 // Default Kakao map zoom level
            });

            // Initialize Kakao Marker Clusterer with custom red styling
            kakaoClusterer = new kakao.maps.MarkerClusterer({
                map: map,
                averageCenter: true,
                minLevel: 6, // Start clustering from zoom level 6 upwards
                styles: [{
                    width: '46px',
                    height: '46px',
                    background: 'rgba(37, 99, 235, 0.9)', // Royal Blue
                    borderRadius: '50%',
                    color: '#fff',
                    textAlign: 'center',
                    fontWeight: 'bold',
                    lineHeight: '42px',
                    fontSize: '15px',
                    border: '2px solid #fff',
                    boxShadow: '0 4px 10px rgba(0, 0, 0, 0.2)'
                }]
            });

            // Add standard zoom control UI for better usability
            const zoomControl = new kakao.maps.ZoomControl();
            map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

            // If we have URL parameters, apply them after map is initialized
            parseUrlParameters();
        }

        function closeAllInfoWindows() {
            for (let id in markers) {
                if (markers[id]) {
                    if (markers[id].infoWindow) {
                        markers[id].infoWindow.close();
                    } else if (markers[id].marker && markers[id].marker.closePopup) {
                        markers[id].marker.closePopup();
                    }
                }
            }
        }

        // 동적 캔버스 기반 숫자 배지 생성 유틸리티
        function createBadgeMarkerImage(count) {
            const canvas = document.createElement('canvas');
            canvas.width = 38;
            canvas.height = 38;
            const ctx = canvas.getContext('2d');

            // 바깥 흰색 테두리와 빨간 버블 배경 드로잉
            ctx.beginPath();
            ctx.arc(19, 19, 16, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(37, 99, 235, 0.95)'; // Royal Blue
            ctx.fill();
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();

            // 그림자 효과 드로잉
            ctx.beginPath();
            ctx.arc(19, 19, 18, 0, 2 * Math.PI);
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.stroke();

            // 중앙 흰색 숫자
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 13px "Noto Sans KR", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(count, 19, 19);

            const dataUrl = canvas.toDataURL();
            const imageSize = new kakao.maps.Size(38, 38);
            const imageOption = { offset: new kakao.maps.Point(19, 19) };
            
            return new kakao.maps.MarkerImage(dataUrl, imageSize, imageOption);
        }

        function renderAllProperties(customProps) {
            const props = customProps || getProperties();
            
            const kakaoMarkersArray = [];

            // 1. 위도 경도 좌표 기준으로 매물 그룹화 (동일 좌표 중첩 방지)
            const coordsMap = {};
            props.forEach(p => {
                if (p.lat && p.lng) {
                    // 소수점 6자리까지 고정하여 동일 좌표 묶기
                    const key = `${parseFloat(p.lat).toFixed(6)}_${parseFloat(p.lng).toFixed(6)}`;
                    if (!coordsMap[key]) {
                        coordsMap[key] = {
                            lat: parseFloat(p.lat),
                            lng: parseFloat(p.lng),
                            items: []
                        };
                    }
                    coordsMap[key].items.push(p);
                }
            });

            // 2. 기존 마커 및 클러스터러 비우기
            if (map) {
                if (kakaoClusterer) {
                    kakaoClusterer.clear();
                }
                for (let id in markers) {
                    if (markers[id] && markers[id].marker) {
                        markers[id].marker.setMap(null);
                    }
                }
                markers = {};
            } else if (leafletMap) {
                if (leafletClusterGroup) {
                    leafletMap.removeLayer(leafletClusterGroup);
                }
                // 리플렛 뭉텅이 클러스터도 커스텀 디자인
                leafletClusterGroup = L.markerClusterGroup({
                    iconCreateFunction: function(cluster) {
                        const childCount = cluster.getChildCount();
                        return new L.DivIcon({ 
                            html: `<div style="background: rgba(37, 99, 235, 0.9); width: 44px; height: 44px; border-radius: 50%; color: #fff; text-align: center; line-height: 40px; font-weight: 700; font-size: 14px; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">${childCount}</div>`, 
                            className: 'custom-cluster-icon', 
                            iconSize: L.point(44, 44) 
                        });
                    }
                });
                markers = {};
            }

            // 3. 그룹별로 지도 핀(배지)을 단 1개씩 생성
            Object.keys(coordsMap).forEach(key => {
                const group = coordsMap[key];
                const count = group.items.length;

                // [카카오 지도용 핀]
                if (map) {
                    const latlng = new kakao.maps.LatLng(group.lat, group.lng);
                    
                    // 동적 Canvas 이미지 생성 적용! (1개면 1, 4개면 4 표시)
                    const markerImg = createBadgeMarkerImage(count);
                    
                    const marker = new kakao.maps.Marker({
                        position: latlng,
                        image: markerImg,
                        title: `${count}개의 매물`
                    });
                    
                    // 팝업 내용 조립
                    let popupContent = "";
                    if (count === 1) {
                        const p = group.items[0];
                        popupContent = `
                            <div class="map-popup-content" style="padding: 10px; min-width: 180px; font-family: 'Noto Sans KR', sans-serif; background: #fff;">
                                <h4 style="margin: 0 0 5px 0; font-size: 13px; color: #0c1222; font-weight: 700; line-height: 1.3;">${escapeHtml(p.title)}</h4>
                                <p style="margin: 0 0 6px 0; font-size: 11px; color: #666; line-height: 1.4;">${escapeHtml(p.desc)}</p>
                                <strong style="font-size: 12px; color: #C5A059;">${escapeHtml(p.price)}</strong>
                            </div>
                        `;
                    } else {
                        // 한 건물 다세대 오피스텔 스크롤형
                        popupContent = `
                            <div class="map-popup-content" style="padding: 10px; min-width: 220px; max-height: 180px; overflow-y: auto; font-family: 'Noto Sans KR', sans-serif; background: #fff;">
                                <div style="border-bottom: 2px solid var(--accent-color); padding-bottom: 4px; margin-bottom: 8px;">
                                    <h4 style="margin: 0; font-size: 11px; color: #64748b; font-weight: bold;">🏢 이 건물 매물 총 ${count}건</h4>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 8px;">
                        `;
                        group.items.forEach(p => {
                            popupContent += `
                                <div style="border-bottom: 1px solid #f1f5f9; padding-bottom: 6px; margin-bottom: 2px;">
                                    <h5 style="margin: 0 0 2px 0; font-size: 11px; color: var(--primary-color); font-weight: 700;">${escapeHtml(p.title)}</h5>
                                    <p style="margin: 0 0 2px 0; font-size: 9px; color: #64748b; line-height: 1.3;">${escapeHtml(p.desc)}</p>
                                    <strong style="font-size: 10px; color: var(--accent-color);">${escapeHtml(p.price)}</strong>
                                </div>
                            `;
                        });
                        popupContent += `
                                </div>
                            </div>
                        `;
                    }

                    const infoWindow = new kakao.maps.InfoWindow({
                        content: popupContent,
                        removable: true
                    });
                    
                    kakao.maps.event.addListener(marker, 'click', () => {
                        closeAllInfoWindows();
                        infoWindow.open(map, marker);
                    });

                    // 그룹 구분을 위해 첫 매물 ID를 키로 사용
                    const mainId = group.items[0].id;
                    markers[mainId] = {
                        marker: marker,
                        infoWindow: infoWindow
                    };
                    
                    kakaoMarkersArray.push(marker);
                } 
                // [대체 리플렛 지도용 핀]
                else if (leafletMap) {
                    // 리플렛용 1개짜리 핀도 파란색 숫자 배지로 표시하기 위해 DivIcon 사용!
                    const leafletMarkerIcon = L.divIcon({
                        html: `<div style="background: rgba(37, 99, 235, 0.95); width: 34px; height: 34px; border-radius: 50%; color: #fff; text-align: center; line-height: 30px; font-weight: 700; font-size: 12px; border: 2px solid #fff; box-shadow: 0 3px 8px rgba(0,0,0,0.2);">${count}</div>`,
                        className: 'leaflet-custom-badge',
                        iconSize: [34, 34],
                        iconAnchor: [17, 17]
                    });
                    
                    const marker = L.marker([group.lat, group.lng], { icon: leafletMarkerIcon });
                    
                    let popupContent = "";
                    if (count === 1) {
                        const p = group.items[0];
                        popupContent = `
                            <div class="map-popup-content" style="padding: 5px; min-width: 160px; font-family: 'Noto Sans KR', sans-serif;">
                                <h4 style="margin: 0 0 5px 0; font-size: 12px; color: #0c1222; font-weight: 700; line-height: 1.3;">${escapeHtml(p.title)}</h4>
                                <p style="margin: 0 0 6px 0; font-size: 10px; color: #666; line-height: 1.4;">${escapeHtml(p.desc)}</p>
                                <strong style="font-size: 11px; color: #C5A059;">${escapeHtml(p.price)}</strong>
                            </div>
                        `;
                    } else {
                        popupContent = `
                            <div class="map-popup-content" style="padding: 5px; min-width: 180px; max-height: 150px; overflow-y: auto; font-family: 'Noto Sans KR', sans-serif;">
                                <div style="border-bottom: 2px solid #C5A059; padding-bottom: 3px; margin-bottom: 6px;">
                                    <h4 style="margin: 0; font-size: 10px; color: #666; font-weight: bold;">🏢 이 건물 매물 총 ${count}건</h4>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 6px;">
                        `;
                        group.items.forEach(p => {
                            popupContent += `
                                <div style="border-bottom: 1px solid #eee; padding-bottom: 4px; margin-bottom: 2px;">
                                    <h5 style="margin: 0 0 2px 0; font-size: 10px; color: #0c1222; font-weight: 700;">${escapeHtml(p.title)}</h5>
                                    <strong style="font-size: 9px; color: #C5A059;">${escapeHtml(p.price)}</strong>
                                </div>
                            `;
                        });
                        popupContent += `
                                </div>
                            </div>
                        `;
                    }
                    
                    marker.bindPopup(popupContent);
                    
                    marker.on('click', () => {
                        closeAllInfoWindows();
                        marker.openPopup();
                    });

                    const mainId = group.items[0].id;
                    markers[mainId] = {
                        marker: marker,
                        isLeaflet: true
                    };
                    
                    leafletClusterGroup.addLayer(marker);
                }
            });

            // Commit markers to clusterer engines after loop
            if (map && kakaoClusterer) {
                kakaoClusterer.addMarkers(kakaoMarkersArray);
            } else if (leafletMap && leafletClusterGroup) {
                leafletMap.addLayer(leafletClusterGroup);
            }
        }

        // Filtering logic
        function applyFilters() {
            const selectedRegion = document.getElementById('filterRegion').value;
            const selectedType = document.getElementById('filterType').value;
            const selectedFloor = document.getElementById('filterFloor').value;
            const allProps = getProperties();

            const filtered = allProps.filter(p => {
                const regionMatch = !selectedRegion || p.tag === selectedRegion;
                const typeMatch = !selectedType || p.type === selectedType;
                const floorMatch = !selectedFloor || p.floor === selectedFloor;
                return regionMatch && typeMatch && floorMatch;
            });

            // Update count display
            document.getElementById('filterCount').innerText = `검색된 매물: ${filtered.length}개`;

            // Render filtered properties
            renderAllProperties(filtered);

            // Relocate map center to the first matched property if exists
            if (filtered.length > 0) {
                const first = filtered[0];
                if (first.lat && first.lng) {
                    if (map) {
                        map.panTo(new kakao.maps.LatLng(parseFloat(first.lat), parseFloat(first.lng)));
                        map.setLevel(4);
                    } else if (leafletMap) {
                        leafletMap.panTo([parseFloat(first.lat), parseFloat(first.lng)]);
                    }
                }
            }
        }

        // URL query parameter parsing
        function parseUrlParameters() {
            const params = new URLSearchParams(window.location.search);
            const regionParam = params.get('region');
            const typeParam = params.get('type');
            const floorVal = params.get('floor');

            if (regionParam) {
                document.getElementById('filterRegion').value = regionParam;
            }
            if (typeParam) {
                document.getElementById('filterType').value = typeParam;
            }
            if (floorVal) {
                document.getElementById('filterFloor').value = floorVal;
            }

            if (regionParam || typeParam || floorVal) {
                applyFilters();
            } else {
                // Initialize default view
                document.getElementById('filterCount').innerText = `검색된 매물: ${getProperties().length}개`;
                renderAllProperties();
            }
        }

        // Simple HTML Escaping for security
        function escapeHtml(string) {
            return String(string).replace(/[&<>"']/g, function (s) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[s];
            });
        }

        // Populate floor dropdown (-6F to 30F)
        function populateFloorOptions() {
            const select = document.getElementById('filterFloor');
            select.innerHTML = '<option value="">층수</option>';
            // 지하 6층 ~ 지하 1층
            for (let i = -6; i <= -1; i++) {
                const opt = document.createElement('option');
                opt.value = `${i}층`;
                opt.innerText = `지하 ${Math.abs(i)}층`;
                select.appendChild(opt);
            }
            // 1층 ~ 30층
            for (let i = 1; i <= 30; i++) {
                const opt = document.createElement('option');
                opt.value = `${i}층`;
                opt.innerText = `${i}층`;
                select.appendChild(opt);
            }
        }

        // Run
        populateFloorOptions();
        initMap();
    </script>
</body>

</html>
