<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지도보기 | 둥지부동산중개법인</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body style="overflow: hidden;"> <!-- Lock scroll for full screen map feel -->
    <header id="header" class="scrolled"> <!-- Force header background color on static page -->
        <div class="container">
            <a href="index.html" class="logo" style="text-decoration: none;">(주)둥지부동산중개법인</a>
            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
            <nav>
                <ul class="nav-list">
                    <li><a href="index.html#home">홈</a></li>
                    <li><a href="index.html#about">법인소개</a></li>
                    <li><a href="properties.html">매물정보</a></li>
                    <li><a href="map.html" class="active" style="color: var(--accent-color); font-weight: 700;">지도보기</a></li>
                    <li><a href="index.html#submit-property">매물내놓기</a></li>
                    <li><a href="index.html#data-guide">시세</a></li>
                    <li><a href="guide.html">임대차 가이드</a></li>
                    <li><a href="corporate.html">기업서비스</a></li>
                    <li><a href="recruit.html">인재모집</a></li>
                    <li><a href="https://www.doongji.co.kr/" target="_blank">건물관리서비스</a></li>
                    <li><a href="index.html#contact" class="btn-consult">상담문의</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Filter Header -->
    <div class="properties-filter-header">
        <select id="filterRegion" onchange="applyFilters()">
            <option value="">전체지역</option>
            <option value="서울">서울</option>
            <option value="경기">경기</option>
        </select>
        <select id="filterType" onchange="applyFilters()">
            <option value="">매물종류</option>
            <option value="사무실">사무실</option>
            <option value="상가">상가</option>
            <option value="빌딩">빌딩</option>
            <option value="토지">토지</option>
            <option value="주거용">주거용</option>
        </select>
        <select id="filterFloor" onchange="applyFilters()">
            <option value="">층수</option>
        </select>
        <span style="font-size: 13px; color: #64748b; font-weight: 500;" id="filterCount">검색된 매물: 0개</span>
        
        <!-- Admin Login Button -->
        <a href="admin.html" class="btn-admin-link" 
           style="margin-left: auto; text-decoration: none; font-size: 12px; color: #64748b; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 50px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; background: var(--white); box-shadow: 0 2px 5px rgba(0,0,0,0.05);"
           onmouseenter="this.style.borderColor='var(--accent-color)'; this.style.color='var(--primary-color)'; this.style.boxShadow='0 2px 8px rgba(197, 160, 89, 0.25)';" 
           onmouseleave="this.style.borderColor='var(--border-color)'; this.style.color='#64748b'; this.style.boxShadow='0 2px 5px rgba(0,0,0,0.05)';">
            <i class="fas fa-lock" style="font-size: 10px; color: var(--accent-color);"></i> 관리자 로그인
        </a>
    </div>

    <!-- Main Full Screen Map -->
    <section style="margin-top: 122px; height: calc(100vh - 122px); width: 100%; position: relative;">
        <div id="map" style="width: 100%; height: 100%;"></div>
    </section>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3e8097eb16c9e4942d0cbb215d2da6e6" onerror="window.kakaoMapFailed = true;"></script>
    <script>
        // Mobile Menu Toggle
        const menuToggle = document.getElementById('mobile-menu');
        const navList = document.querySelector('.nav-list');

        menuToggle.addEventListener('click', () => {
            navList.classList.toggle('active');
        });

        // Dynamic Loading from localStorage & Kakao Map integration
        function getProperties() {
            let props = localStorage.getItem('nest_properties');
            // Fallback default properties (Gangnam Datasets)
            const defaultProperties = [
                {
                    id: "prop-1",
                    tag: "서울",
                    type: "사무실",
                    floor: "5층",
                    title: "역삼역 초역세권 대형 프라임 오피스",
                    desc: "전용 150평 / 테헤란로 뷰 / 고층 오피스 빌딩 내 지상 5층",
                    price: "보증금 5억 / 월 4,500만",
                    imageUrl: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=800",
                    lat: 37.5019,
                    lng: 127.0374
                },
                {
                    id: "prop-2",
                    tag: "서울",
                    type: "상가",
                    floor: "1층",
                    title: "청담동 명품거리 1층 로드샵 상가",
                    desc: "전용 80평 / 쇼룸 완비 / 1층 테라스 활용 가능",
                    price: "가격 협의",
                    imageUrl: "https://images.unsplash.com/photo-1554469384-e58fac16e23a?auto=format&fit=crop&q=80&w=800",
                    lat: 37.5251,
                    lng: 127.0435
                },
                {
                    id: "prop-3",
                    tag: "경기",
                    type: "토지",
                    floor: "1층",
                    title: "용인 기흥 상업용 개발 토지 매매",
                    desc: "토지면적 450평 / 대로변 코너 / 근생 및 물류 부지 추천",
                    price: "매매 45억",
                    imageUrl: "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&q=80&w=800",
                    lat: 37.2804,
                    lng: 127.1179
                },
                {
                    id: "prop-4",
                    tag: "서울",
                    type: "상가",
                    floor: "-1층",
                    title: "강남역 인근 지하 대형 F&B 상가",
                    desc: "전용 120평 / 지하 1층 단독 진입 계단 / 주방 설비 완비 및 층고 4m",
                    price: "보증금 2억 / 월 1,500만",
                    imageUrl: "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&q=80&w=800",
                    lat: 37.4979,
                    lng: 127.0276
                },
                {
                    id: "prop-5",
                    tag: "경기",
                    type: "주거용",
                    floor: "12층",
                    title: "분당 정자동 오피스텔 주거용 풀옵션",
                    desc: "전용 24평 / 지상 12층 탄천 뷰 / 침실 2개 / 즉시 입주 가능",
                    price: "보증금 3,000만 / 월 180만",
                    imageUrl: "https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=800",
                    lat: 37.3614,
                    lng: 127.1086
                },
                {
                    id: "prop-6",
                    tag: "서울",
                    type: "빌딩",
                    floor: "7층",
                    title: "테헤란로 삼성동 대로변 프라임 사옥 빌딩",
                    desc: "연면적 450평 / 지상 7층 전체 통임대 / 자주식 주차 10대",
                    price: "보증금 8억 / 월 6,000만",
                    imageUrl: "https://images.unsplash.com/photo-1577495508048-b635879837f1?auto=format&fit=crop&q=80&w=800",
                    lat: 37.5097,
                    lng: 127.0620
                }
            ];

            if (!props || JSON.parse(props).length === 0 || JSON.parse(props)[0].tag === "부산진구" || (JSON.parse(props)[0].tag !== "서울" && JSON.parse(props)[0].tag !== "경기")) {
                localStorage.setItem('nest_properties', JSON.stringify(defaultProperties));
                return defaultProperties;
            }
            return JSON.parse(props);
        }

        let map;
        let leafletMap;
        let markers = {}; 

        // Dynamic Leaflet Loader
        function loadLeaflet(callback) {
            // Leaflet CSS
            const css = document.createElement('link');
            css.rel = 'stylesheet';
            css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
            document.head.appendChild(css);

            // Leaflet JS
            const js = document.createElement('script');
            js.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
            js.onload = callback;
            document.head.appendChild(js);
        }

        function initMap() {
            // Check if Kakao Maps API is loaded, else fallback to Leaflet Map
            if (typeof kakao === 'undefined' || !kakao.maps || window.kakaoMapFailed) {
                console.warn("Kakao Maps API failed to load or was blocked. Initiating Leaflet fallback map...");
                
                // Show brief fallback message inside #map before loading Leaflet
                document.getElementById('map').innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #666; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #f9f9f9; font-family: sans-serif;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #C5A059; margin-bottom: 15px;"></i>
                        <h4 style="margin: 0 0 10px 0; color: #0c1222;">안전 대체 지도 연결 중</h4>
                        <p style="font-size: 0.85rem; max-width: 300px; line-height: 1.5; margin: 0 0 15px 0;">
                            카카오 지도 도메인 승인 대기 상태입니다. 임시로 무인증 안전 지도를 즉시 가동합니다.
                        </p>
                    </div>
                `;

                loadLeaflet(() => {
                    document.getElementById('map').innerHTML = ''; // Clear loading message
                    
                    // Center around Gangnam/Yeoksam (37.5080, 127.0360)
                    leafletMap = L.map('map').setView([37.5080, 127.0360], 13);
                    
                    // Load standard OpenStreetMap tiles
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(leafletMap);

                    // Add a tiny gold indicator badge on top of map container
                    const badge = document.createElement('div');
                    badge.style.position = 'absolute';
                    badge.style.top = '15px';
                    badge.style.left = '60px';
                    badge.style.zIndex = '1000';
                    badge.style.background = 'rgba(12, 18, 34, 0.95)';
                    badge.style.color = '#C5A059';
                    badge.style.padding = '6px 12px';
                    badge.style.borderRadius = '4px';
                    badge.style.fontSize = '11px';
                    badge.style.fontWeight = '600';
                    badge.style.boxShadow = '0 2px 8px rgba(0,0,0,0.15)';
                    badge.style.pointerEvents = 'none';
                    badge.style.fontFamily = 'sans-serif';
                    badge.innerHTML = '<i class="fas fa-info-circle" style="margin-right: 5px;"></i>대체 지도 작동 중 (카카오 인증 대기)';
                    document.getElementById('map').appendChild(badge);

                    // Invalidate size after brief timeout to avoid leaflet rendering breaks
                    setTimeout(() => {
                        leafletMap.invalidateSize();
                    }, 100);

                    // Parse params & render
                    parseUrlParameters();
                });
                return;
            }

            map = new kakao.maps.Map(document.getElementById('map'), {
                center: new kakao.maps.LatLng(37.5080, 127.0360), // Centered around Gangnam/Yeoksam, Seoul
                level: 5 // Default Kakao map zoom level
            });

            // Add standard zoom control UI for better usability
            const zoomControl = new kakao.maps.ZoomControl();
            map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

            // If we have URL parameters, apply them after map is initialized
            parseUrlParameters();
        }

        function closeAllInfoWindows() {
            for (let id in markers) {
                if (markers[id]) {
                    if (markers[id].infoWindow) {
                        markers[id].infoWindow.close();
                    } else if (markers[id].marker && markers[id].marker.closePopup) {
                        markers[id].marker.closePopup();
                    }
                }
            }
        }

        function renderAllProperties(customProps) {
            const props = customProps || getProperties();
            
            // Clear existing markers
            if (map) {
                for (let id in markers) {
                    if (markers[id] && markers[id].marker) {
                        markers[id].marker.setMap(null);
                    }
                }
                markers = {};
            } else if (leafletMap) {
                for (let id in markers) {
                    if (markers[id] && markers[id].marker) {
                        leafletMap.removeLayer(markers[id].marker);
                    }
                }
                markers = {};
            }

            props.forEach(p => {
                // Add Marker to Kakao Map
                if (map && p.lat && p.lng) {
                    const latlng = new kakao.maps.LatLng(parseFloat(p.lat), parseFloat(p.lng));
                    const marker = new kakao.maps.Marker({
                        position: latlng,
                        map: map,
                        title: p.title
                    });
                    
                    const popupContent = `
                        <div class="map-popup-content" style="padding: 10px; min-width: 180px; font-family: 'Noto Sans KR', sans-serif; background: #fff;">
                            <h4 style="margin: 0 0 5px 0; font-size: 13px; color: #0c1222; font-weight: 700; line-height: 1.3;">${escapeHtml(p.title)}</h4>
                            <p style="margin: 0 0 6px 0; font-size: 11px; color: #666; line-height: 1.4;">${escapeHtml(p.desc)}</p>
                            <strong style="font-size: 12px; color: #C5A059;">${escapeHtml(p.price)}</strong>
                        </div>
                    `;

                    const infoWindow = new kakao.maps.InfoWindow({
                        content: popupContent,
                        removable: true
                    });
                    
                    kakao.maps.event.addListener(marker, 'click', () => {
                        closeAllInfoWindows();
                        infoWindow.open(map, marker);
                    });

                    markers[p.id] = {
                        marker: marker,
                        infoWindow: infoWindow
                    };
                } 
                // Add Marker to Fallback Leaflet Map
                else if (leafletMap && p.lat && p.lng) {
                    const marker = L.marker([parseFloat(p.lat), parseFloat(p.lng)]).addTo(leafletMap);
                    
                    const popupContent = `
                        <div class="map-popup-content" style="padding: 5px; min-width: 160px; font-family: 'Noto Sans KR', sans-serif;">
                            <h4 style="margin: 0 0 5px 0; font-size: 12px; color: #0c1222; font-weight: 700; line-height: 1.3;">${escapeHtml(p.title)}</h4>
                            <p style="margin: 0 0 6px 0; font-size: 10px; color: #666; line-height: 1.4;">${escapeHtml(p.desc)}</p>
                            <strong style="font-size: 11px; color: #C5A059;">${escapeHtml(p.price)}</strong>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                    
                    marker.on('click', () => {
                        closeAllInfoWindows();
                        marker.openPopup();
                    });

                    markers[p.id] = {
                        marker: marker,
                        isLeaflet: true
                    };
                }
            });
        }

        // Filtering logic
        function applyFilters() {
            const selectedRegion = document.getElementById('filterRegion').value;
            const selectedType = document.getElementById('filterType').value;
            const selectedFloor = document.getElementById('filterFloor').value;
            const allProps = getProperties();

            const filtered = allProps.filter(p => {
                const regionMatch = !selectedRegion || p.tag === selectedRegion;
                const typeMatch = !selectedType || p.type === selectedType;
                const floorMatch = !selectedFloor || p.floor === selectedFloor;
                return regionMatch && typeMatch && floorMatch;
            });

            // Update count display
            document.getElementById('filterCount').innerText = `검색된 매물: ${filtered.length}개`;

            // Render filtered properties
            renderAllProperties(filtered);

            // Relocate map center to the first matched property if exists
            if (filtered.length > 0) {
                const first = filtered[0];
                if (first.lat && first.lng) {
                    if (map) {
                        map.panTo(new kakao.maps.LatLng(parseFloat(first.lat), parseFloat(first.lng)));
                        map.setLevel(4);
                    } else if (leafletMap) {
                        leafletMap.panTo([parseFloat(first.lat), parseFloat(first.lng)]);
                    }
                }
            }
        }

        // URL query parameter parsing
        function parseUrlParameters() {
            const params = new URLSearchParams(window.location.search);
            const regionParam = params.get('region');
            const typeParam = params.get('type');
            const floorVal = params.get('floor');

            if (regionParam) {
                document.getElementById('filterRegion').value = regionParam;
            }
            if (typeParam) {
                document.getElementById('filterType').value = typeParam;
            }
            if (floorVal) {
                document.getElementById('filterFloor').value = floorVal;
            }

            if (regionParam || typeParam || floorVal) {
                applyFilters();
            } else {
                // Initialize default view
                document.getElementById('filterCount').innerText = `검색된 매물: ${getProperties().length}개`;
                renderAllProperties();
            }
        }

        // Simple HTML Escaping for security
        function escapeHtml(string) {
            return String(string).replace(/[&<>"']/g, function (s) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[s];
            });
        }

        // Populate floor dropdown (-6F to 30F)
        function populateFloorOptions() {
            const select = document.getElementById('filterFloor');
            select.innerHTML = '<option value="">층수</option>';
            // 지하 6층 ~ 지하 1층
            for (let i = -6; i <= -1; i++) {
                const opt = document.createElement('option');
                opt.value = `${i}층`;
                opt.innerText = `지하 ${Math.abs(i)}층`;
                select.appendChild(opt);
            }
            // 1층 ~ 30층
            for (let i = 1; i <= 30; i++) {
                const opt = document.createElement('option');
                opt.value = `${i}층`;
                opt.innerText = `${i}층`;
                select.appendChild(opt);
            }
        }

        // Run
        populateFloorOptions();
        initMap();
    </script>
</body>

</html>
