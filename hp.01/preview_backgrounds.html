<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Preview</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .hero-backgrounds {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .hero-bg.active {
            opacity: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            /* Lighter overlay for brighter feel */
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="hero">
        <div class="hero-backgrounds">
            <!-- Image 1: Teheran-ro (From Property 1) -->
            <div class="hero-bg active"
                style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=1600')">
            </div>
            <!-- Image 2: Dosan-daero (From Property 2) -->
            <div class="hero-bg"
                style="background-image: url('https://images.unsplash.com/photo-1554469384-e58fac16e23a?auto=format&fit=crop&q=80&w=1600')">
            </div>
            <!-- Image 3: Gangnam Station (From Property 3) -->
            <div class="hero-bg"
                style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1600')">
            </div>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>강남, 성공을 선점하다</h1>
            <p>밝은 주간 배경화면 프리뷰입니다.</p>
        </div>
    </div>

    <script>
        const bgs = document.querySelectorAll('.hero-bg');
        let current = 0;

        function nextSlide() {
            bgs[current].classList.remove('active');
            current = (current + 1) % bgs.length;
            bgs[current].classList.add('active');
        }

        setInterval(nextSlide, 3000); // Change every 3 seconds
    </script>

</body>

</html>
